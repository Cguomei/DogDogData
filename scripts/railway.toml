# Railway 部署配置
# 文档: https://docs.railway.app/reference/variables

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python seed_demo_data.py && gunicorn app:create_app() --bind 0.0.0.0:$PORT"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
