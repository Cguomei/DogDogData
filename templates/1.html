<script>
fetch('/api/breeds')
    .then(response => {
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        return response.json();
    })
    .then(data => {
        // 1. 如果表格已初始化，先销毁
        const tableId = '#breed-table';
        if ($.fn.DataTable.isDataTable(tableId)) {
            $(tableId).DataTable().destroy();
        }
        // 清空 tbody
        $('#breed-tbody').empty();

        // 2. 初始化 DataTables（直接使用 data 属性）
        $(tableId).DataTable({
            data: data,
            columns: [
                { data: 'breed_name', title: '品种名' },
                { data: 'avg_life_years', title: '平均寿命(年)', defaultContent: '-' },
                { data: 'size_category', title: '体型', defaultContent: '-' },
                { data: 'popularity', title: '人气值' }
            ],
            language: {
                url: 'https://cdn.datatables.net/plug-ins/1.13.6/i18n/zh-CN.json'
            },
            pageLength: 5,
            order: [[3, 'desc']],
            responsive: true,
            dom: '<"row"<"col-sm-6"l><"col-sm-6"f>>rtip'
        });

        // 3. 绘制 ECharts 图表（你的原有代码，保持不变）
        const popularityChart = echarts.init(document.getElementById('popularityChart'));
        const breedNames = data.map(b => b.breed_name);
        const popularities = data.map(b => b.popularity);
        popularityChart.setOption({
            title: { text: '品种人气值', left: 'center' },
            tooltip: { trigger: 'axis' },
            xAxis: { type: 'category', data: breedNames, axisLabel: { rotate: 30 } },
            yAxis: { type: 'value' },
            series: [{
                name: '人气',
                type: 'bar',
                data: popularities,
                itemStyle: { color: '#36a2eb' }
            }]
        });

        const sizeChart = echarts.init(document.getElementById('sizeChart'));
        const sizeCount = {};
        data.forEach(b => {
            const size = b.size_category || '未知';
            sizeCount[size] = (sizeCount[size] || 0) + 1;
        });
        const pieData = Object.entries(sizeCount).map(([name, value]) => ({ name, value }));
        sizeChart.setOption({
            title: { text: '体型分布', left: 'center' },
            tooltip: { trigger: 'item' },
            series: [{
                type: 'pie',
                radius: '50%',
                data: pieData,
                emphasis: { itemStyle: { shadowBlur: 10, shadowOffsetX: 0, shadowColor: 'rgba(0,0,0,0.5)' } }
            }]
        });

        // 隐藏加载动画（如果有）
        document.getElementById('loading-spinner').style.display = 'none';
    })
    .catch(error => {
        console.error('数据加载失败:', error);
        $('#breed-tbody').html('<tr><td colspan="4" class="text-center text-danger">加载失败，请稍后重试</td></tr>');
    });
</script>
