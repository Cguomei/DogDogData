<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据新鲜度监控 - 狗狗数据分析系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .freshness-meter {
            height: 200px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .breed-freshness-item {
            padding: 10px;
            border-left: 4px solid #ddd;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-radius: 5px;
            transition: all 0.3s;
        }
        .breed-freshness-item:hover {
            transform: translateX(5px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .status-badge {
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-fresh { background: #d4edda; color: #155724; border-color: #c3e6cb; }
        .status-warning { background: #fff3cd; color: #856404; border-color: #ffeeba; }
        .status-stale { background: #f8d7da; color: #721c24; border-color: #f5c6cb; }
        .status-critical { background: #dc3545; color: white; border-color: #dc3545; }
    </style>
</head>
<body>
    {% extends "base.html" %}
    
    {% block title %}数据新鲜度监控{% endblock %}
    
    {% block content %}
    <div class="container mt-4">
        <!-- 页面标题 -->
        <div class="row mb-4">
            <div class="col-12">
                <h2>📊 数据新鲜度监控</h2>
                <p class="text-muted">实时监控各品种数据的更新状态</p>
            </div>
        </div>
        
        <!-- 总体新鲜度仪表板 -->
        <div class="row mb-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">🎯 总体数据状态</h5>
                    </div>
                    <div class="card-body">
                        <div id="overall-freshness" class="freshness-meter" style="background: linear-gradient(135deg, #6c757d 0%, #495057 100%);">
                            加载中...
                        </div>
                        <div class="row text-center">
                            <div class="col-4">
                                <h6 class="text-success">新鲜数据</h6>
                                <h3 id="fresh-count">-</h3>
                            </div>
                            <div class="col-4">
                                <h6 class="text-warning">即将过期</h6>
                                <h3 id="warning-count">-</h3>
                            </div>
                            <div class="col-4">
                                <h6 class="text-danger">已过期</h6>
                                <h3 id="stale-count">-</h3>
                            </div>
                        </div>
                        <div class="mt-3">
                            <div class="progress" style="height: 25px;">
                                <div id="fresh-bar" class="progress-bar bg-success" style="width: 0%">0%</div>
                                <div id="warning-bar" class="progress-bar bg-warning" style="width: 0%">0%</div>
                                <div id="stale-bar" class="progress-bar bg-danger" style="width: 0%">0%</div>
                            </div>
                            <small class="text-muted mt-1 d-block">数据新鲜度分布</small>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-info text-white">
                        <h5 class="mb-0">⚡ 更新建议</h5>
                    </div>
                    <div class="card-body">
                        <div id="update-recommendation" class="alert alert-secondary">
                            正在加载...
                        </div>
                        
                        <div class="mt-3">
                            <h6>📈 数据统计</h6>
                            <ul class="list-group">
                                <li class="list-group-item d-flex justify-content-between">
                                    <span>总记录数</span>
                                    <strong id="total-records">-</strong>
                                </li>
                                <li class="list-group-item d-flex justify-content-between">
                                    <span>最后更新时间</span>
                                    <strong id="last-update-time">-</strong>
                                </li>
                                <li class="list-group-item d-flex justify-content-between">
                                    <span>距上次更新</span>
                                    <strong id="hours-since-update">-</strong>
                                </li>
                            </ul>
                        </div>
                        
                        <button class="btn btn-primary w-100 mt-3" onclick="triggerUpdate()">
                            🚀 立即更新数据
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 各品种新鲜度列表 -->
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">🐕 各品种数据新鲜度</h5>
                        <button class="btn btn-sm btn-outline-light" onclick="loadBreedFreshness()">刷新</button>
                    </div>
                    <div class="card-body">
                        <div id="breed-freshness-list">
                            <div class="text-center py-5">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">加载中...</span>
                                </div>
                                <p class="mt-2">正在加载品种数据...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function escapeHtml(text) { if (text == null) return ''; var d = document.createElement('div'); d.textContent = String(text); return d.innerHTML; }
        // 加载总体新鲜度
        async function loadOverallFreshness() {
            try {
                const response = await fetch('/api/data/freshness');
                const data = await response.json();
                
                if (data.success) {
                    const freshness = data.freshness;
                    
                    // 更新仪表板
                    updateFreshnessMeter(freshness);
                    updateCounts(freshness);
                    updateProgressBar(freshness);
                    updateRecommendation(freshness);
                    updateStats(freshness);
                }
            } catch (error) {
                console.error('加载新鲜度失败:', error);
            }
        }
        
        // 更新新鲜度仪表板
        function updateFreshnessMeter(freshness) {
            const meter = document.getElementById('overall-freshness');
            const colors = {
                'fresh': '#43e97b',
                'warning': '#ffc107',
                'stale': '#ff6b6b',
                'critical': '#f5576c',
                'no_data': '#6c757d'
            };
            
            const labels = {
                'fresh': '✅ 数据新鲜',
                'warning': '⚠️ 即将过期',
                'stale': '❌ 数据过期',
                'critical': '🔴 严重过期',
                'no_data': '📭 无数据'
            };
            
            const color = colors[freshness.status] || '#6c757d';
            meter.style.background = `linear-gradient(135deg, ${color} 0%, ${adjustBrightness(color, -30)} 100%)`;
            meter.textContent = labels[freshness.status] || freshness.status;
        }
        
        // 更新计数
        function updateCounts(freshness) {
            document.getElementById('fresh-count').textContent = freshness.fresh_records || 0;
            document.getElementById('warning-count').textContent = freshness.warning_records || 0;
            document.getElementById('stale-count').textContent = freshness.stale_records || 0;
        }
        
        // 更新进度条
        function updateProgressBar(freshness) {
            const total = freshness.total_records || 1;
            const freshPct = (freshness.fresh_records / total * 100).toFixed(1);
            const warningPct = (freshness.warning_records / total * 100).toFixed(1);
            const stalePct = (freshness.stale_records / total * 100).toFixed(1);
            
            document.getElementById('fresh-bar').style.width = `${freshPct}%`;
            document.getElementById('fresh-bar').textContent = `${freshPct}%`;
            
            document.getElementById('warning-bar').style.width = `${warningPct}%`;
            document.getElementById('warning-bar').textContent = `${warningPct}%`;
            
            document.getElementById('stale-bar').style.width = `${stalePct}%`;
            document.getElementById('stale-bar').textContent = `${stalePct}%`;
        }
        
        // 更新建议
        function updateRecommendation(freshness) {
            const recDiv = document.getElementById('update-recommendation');
            const alerts = {
                'fresh': 'alert-success',
                'warning': 'alert-warning',
                'stale': 'alert-danger',
                'critical': 'alert-danger',
                'no_data': 'alert-info'
            };
            
            recDiv.className = `alert ${alerts[freshness.status] || 'alert-secondary'}`;
            recDiv.innerHTML = `
                <h6>${escapeHtml(freshness.recommendation)}</h6>
                <p class="mb-0">${escapeHtml(freshness.message)}</p>
            `;
        }
        
        // 更新统计信息
        function updateStats(freshness) {
            document.getElementById('total-records').textContent = freshness.total_records || 0;
            document.getElementById('last-update-time').textContent = freshness.last_crawl_time ? 
                new Date(freshness.last_crawl_time).toLocaleString('zh-CN') : '-';
            document.getElementById('hours-since-update').textContent = freshness.hours_since_update ? 
                `${freshness.hours_since_update} 小时` : '-';
        }
        
        // 加载品种新鲜度
        async function loadBreedFreshness() {
            try {
                const response = await fetch('/api/data/breed-freshness');
                const data = await response.json();
                
                if (data.success) {
                    renderBreedList(data.breeds);
                }
            } catch (error) {
                console.error('加载品种新鲜度失败:', error);
            }
        }
        
        // 渲染品种列表
        function renderBreedList(breeds) {
            const container = document.getElementById('breed-freshness-list');
            
            if (!breeds || breeds.length === 0) {
                container.innerHTML = '<div class="text-center text-muted">暂无品种数据</div>';
                return;
            }
            
            const statusClasses = {
                'fresh': 'status-fresh',
                'warning': 'status-warning',
                'stale': 'status-stale',
                'critical': 'status-critical'
            };
            
            const statusLabels = {
                'fresh': '✅ 新鲜',
                'warning': '⚠️ 警告',
                'stale': '❌ 过期',
                'critical': '🔴 严重'
            };
            
            const borderColors = {
                'fresh': '#28a745',
                'warning': '#ffc107',
                'stale': '#dc3545',
                'critical': '#f5576c'
            };
            
            container.innerHTML = breeds.map(breed => `
                <div class="breed-freshness-item" style="border-left-color: ${borderColors[breed.status] || '#ddd'}">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="mb-1">${escapeHtml(breed.breed)}</h6>
                            <small class="text-muted">
                                数量: ${escapeHtml(breed.count)} | 
                                均价: ¥${escapeHtml(breed.avg_price)} | 
                                更新于: ${escapeHtml(breed.hours_ago)}小时前
                            </small>
                        </div>
                        <span class="status-badge ${statusClasses[breed.status]}">
                            ${statusLabels[breed.status]}
                        </span>
                    </div>
                </div>
            `).join('');
        }
        
        // 触发更新
        async function triggerUpdate() {
            if (!confirm('确定要立即更新数据吗？这可能需要几分钟时间。')) {
                return;
            }
            
            window.location.href = '/crawler';
        }
        
        // 辅助函数：调整颜色亮度
        function adjustBrightness(color, amount) {
            return color; // 简化版
        }
        
        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', () => {
            loadOverallFreshness();
            loadBreedFreshness();
        });
        
        // 每60秒自动刷新
        setInterval(() => {
            loadOverallFreshness();
            loadBreedFreshness();
        }, 60000);
    </script>
    {% endblock %}
</body>
</html>
