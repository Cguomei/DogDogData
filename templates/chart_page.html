{% extends "base.html" %}

{% block title %}{{ chart_title }} - 狗狗数据分析{% endblock %}

{% block extra_head %}
<style>
    /* 隐藏宠物容器在图表页面 */
    #virtual-pet-container {
        display: none !important;
    }
</style>
{% endblock %}

{% block content %}
<div class="container-fluid px-4">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <!-- 图表卡片 -->
            <div class="card border-0 mb-4" style="border-radius: 16px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.08); animation: fadeInUp 0.6s ease;">
                <div class="card-header py-4" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none;">
                    <div class="d-flex justify-content-between align-items-center">
                        <h2 class="mb-0 fw-bold" style="font-size: 1.5rem;">
                            <i class="bi bi-graph-up"></i> {{ chart_title }}
                        </h2>
                        <div>
                            <button class="btn btn-light btn-sm me-2" onclick="exportChartData()" style="border-radius: 8px; padding: 0.5rem 1rem; font-weight: 600;">
                                <i class="bi bi-file-earmark-excel"></i> 导出数据
                            </button>
                            <a href="/charts" class="btn btn-light btn-sm me-2" style="border-radius: 8px; padding: 0.5rem 1.5rem; font-weight: 600;">
                                <i class="bi bi-grid"></i> 图表列表
                            </a>
                            <a href="/" class="btn btn-light btn-sm" style="border-radius: 8px; padding: 0.5rem 1.5rem; font-weight: 600;">
                                <i class="bi bi-house"></i> 返回首页
                            </a>
                        </div>
                    </div>
                </div>
                <div class="card-body p-4 bg-white">
                    <div class="chart-wrapper" style="min-height: 500px;">
                        {{ chart_html|safe }}
                    </div>
                </div>
            </div>
            
            <!-- 说明信息 -->
            <div class="card border-0" style="border-radius: 16px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.08);">
                <div class="card-header py-3" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; border: none; font-weight: 600;">
                    <i class="bi bi-info-circle"></i> 图表说明
                </div>
                <div class="card-body">
                    <p class="mb-0 text-muted">
                        <i class="bi bi-lightbulb"></i> 
                        本图表基于真实狗狗销售数据生成，支持缩放、拖拽、数据视图等功能。您可以使用图表右上角的工具栏进行交互操作。
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.chart-wrapper {
    animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}
</style>

<script>
// 导出图表数据
async function exportChartData() {
    try {
        // 根据当前页面获取对应的数据API
        const path = window.location.pathname;
        let apiUrl = '';
        let dataType = '';
        
        // 根据不同图表使用不同的API
        if (path.includes('/chart/scatter')) {
            apiUrl = '/api/chart/scatter/data';  // 散点图：价格数据
            dataType = '价格散点图';
        } else if (path.includes('/chart/line')) {
            apiUrl = '/api/chart/line/data';     // 折线图：体重数据
            dataType = '体重折线图';
        } else if (path.includes('/chart/bar')) {
            apiUrl = '/api/chart/bar/data';      // 柱状图：级别数据
            dataType = '级别柱状图';
        } else if (path.includes('/chart/hist')) {
            apiUrl = '/api/chart/hist/data';     // 直方图：TOP10数据
            dataType = 'TOP10直方图';
        } else if (path.includes('/chart/funnel')) {
            apiUrl = '/api/chart/funnel/data';   // 漏斗图：价格段数据
            dataType = '价格漏斗图';
        } else if (path.includes('/chart/map')) {
            apiUrl = '/api/chart/map/data';      // 地图：产地数据
            dataType = '世界地图';
        }
        
        if (!apiUrl) {
            alert('无法确定数据来源');
            return;
        }
        
        // 显示加载提示
        const btn = event.target.closest('button');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="bi bi-hourglass-split"></i> 加载中...';
        btn.disabled = true;
        
        // 获取数据
        const response = await fetch(apiUrl);
        
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }
        
        const data = await response.json();
        
        if (!data || data.length === 0) {
            alert('没有数据可导出');
            btn.innerHTML = originalText;
            btn.disabled = false;
            return;
        }
        
        // 调用导出API
        const exportResponse = await fetch('/api/export-data', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                format: 'excel',
                filename: '{{ chart_title }}',
                data: data
            })
        });
        
        if (!exportResponse.ok) {
            throw new Error('导出失败');
        }
        
        // 触发下载
        const blob = await exportResponse.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = '{{ chart_title }}.xlsx';
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);
        
        // 恢复按钮状态
        btn.innerHTML = originalText;
        btn.disabled = false;
        
    } catch (error) {
        console.error('导出失败:', error);
        alert('导出失败: ' + error.message);
        const btn = event.target.closest('button');
        if (btn) {
            btn.innerHTML = '<i class="bi bi-file-earmark-excel"></i> 导出数据';
            btn.disabled = false;
        }
    }
}
</script>
{% endblock %}
