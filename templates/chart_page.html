{% extends "base.html" %}

{% block title %}{{ chart_title }} - 狗狗数据分析{% endblock %}

{% block content %}
<div class="chart-container">
    <h2 class="text-center mb-4">{{ chart_title }}</h2>
    <!-- 嵌入图表 HTML 片段（使用 safe 过滤器防止转义） -->
    <div class="chart-wrapper">
        {{ chart_html|safe }}
    </div>
    <div class="text-center mt-3">
        <a href="/" class="btn btn-outline-secondary">返回首页</a>
    </div>
</div>
{% endblock %}
