{% extends "base.html" %}

{% block title %}数据分析中心 - 狗狗数据分析{% endblock %}

{% block content %}
<div class="container-fluid px-4">
    <!-- 页面标题 -->
    <div class="row mb-5">
        <div class="col-12 text-center">
            <h1 class="display-4 fw-bold" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                <i class="bi bi-graph-up-arrow"></i> 数据分析中心
            </h1>
            <p class="lead text-muted">实时监控数据质量、价格趋势和品种热度</p>
        </div>
    </div>

    <!-- 控制面板 -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                        <div>
                            <button class="btn btn-primary" onclick="collectAnalytics()">
                                <i class="bi bi-arrow-repeat"></i> 立即收集数据
                            </button>
                            <button class="btn btn-outline-secondary ms-2" onclick="refreshAllData()">
                                <i class="bi bi-arrow-clockwise"></i> 刷新数据
                            </button>
                        </div>
                        <div>
                            <select class="form-select d-inline-block w-auto" id="dateRange" onchange="loadAllData()">
                                <option value="7d">最近7天</option>
                                <option value="30d" selected>最近30天</option>
                                <option value="90d">最近90天</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 数据质量概览 -->
    <div class="row mb-4">
        <div class="col-12">
            <h3 class="mb-3"><i class="bi bi-shield-check"></i> 数据质量监控</h3>
        </div>
        <div class="col-md-3 mb-3">
            <div class="card border-0 shadow-sm h-100" style="border-radius: 12px;">
                <div class="card-body text-center">
                    <h6 class="text-muted mb-2">总记录数</h6>
                    <h2 class="mb-0" id="totalRecords" style="color: #667eea;">-</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="card border-0 shadow-sm h-100" style="border-radius: 12px;">
                <div class="card-body text-center">
                    <h6 class="text-muted mb-2">数据新鲜度</h6>
                    <h2 class="mb-0" id="freshnessPercentage" style="color: #28a745;">-</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="card border-0 shadow-sm h-100" style="border-radius: 12px;">
                <div class="card-body text-center">
                    <h6 class="text-muted mb-2">平均价格</h6>
                    <h2 class="mb-0" id="avgPrice" style="color: #ffc107;">-</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="card border-0 shadow-sm h-100" style="border-radius: 12px;">
                <div class="card-body text-center">
                    <h6 class="text-muted mb-2">品种数量</h6>
                    <h2 class="mb-0" id="breedCount" style="color: #17a2b8;">-</h2>
                </div>
            </div>
        </div>
    </div>

    <!-- 价格趋势图表 -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="card border-0 shadow-sm" style="border-radius: 12px;">
                <div class="card-header bg-white border-0 py-3">
                    <h5 class="mb-0"><i class="bi bi-graph-up"></i> 价格趋势分析</h5>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">选择品种:</label>
                        <select class="form-select d-inline-block w-auto" id="breedSelect" onchange="loadPriceTrend()">
                            <option value="">全部品种</option>
                        </select>
                    </div>
                    <div id="priceTrendChart" style="height: 400px;">
                        <div class="text-center text-muted py-5">加载中...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 品种热度排行 -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="card border-0 shadow-sm" style="border-radius: 12px;">
                <div class="card-header bg-white border-0 py-3">
                    <h5 class="mb-0"><i class="bi bi-fire"></i> 品种热度排行榜</h5>
                </div>
                <div class="card-body">
                    <div id="breedPopularityList">
                        <div class="text-center text-muted py-5">加载中...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 每日汇总报告 -->
    <div class="row">
        <div class="col-12">
            <div class="card border-0 shadow-sm" style="border-radius: 12px;">
                <div class="card-header bg-white border-0 py-3">
                    <h5 class="mb-0"><i class="bi bi-file-earmark-text"></i> 每日汇总报告</h5>
                </div>
                <div class="card-body">
                    <div id="dailyReport">
                        <div class="text-center text-muted py-5">加载中...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.card {
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.12) !important;
}

#breedPopularityList .list-group-item {
    border-left: 4px solid transparent;
    transition: all 0.2s ease;
}

#breedPopularityList .list-group-item:hover {
    border-left-color: #667eea;
    background-color: #f8f9fa;
}

.trend-up {
    color: #28a745;
}

.trend-down {
    color: #dc3545;
}

.trend-stable {
    color: #6c757d;
}
</style>

<script>
// 页面加载时初始化
document.addEventListener('DOMContentLoaded', function() {
    loadAllData();
});

// 加载所有数据
async function loadAllData() {
    await Promise.all([
        loadDataQuality(),
        loadBreedPopularity(),
        loadDailyReport(),
        loadBreedOptions()
    ]);
}

// 加载数据质量指标
async function loadDataQuality() {
    try {
        const dateRange = document.getElementById('dateRange').value;
        const response = await fetch(`/api/analytics/quality?date_range=${dateRange}`);
        const data = await response.json();
        
        if (data.success && data.data.length > 0) {
            const latest = data.data[0];
            document.getElementById('totalRecords').textContent = latest.total_records.toLocaleString();
            document.getElementById('freshnessPercentage').textContent = latest.freshness_percentage.toFixed(1) + '%';
            document.getElementById('avgPrice').textContent = '¥' + latest.avg_price.toFixed(0);
            document.getElementById('breedCount').textContent = latest.breed_count;
        }
    } catch (error) {
        console.error('加载数据质量失败:', error);
    }
}

// 加载品种选项
async function loadBreedOptions() {
    try {
        const response = await fetch('/api/data/breed-freshness');
        const data = await response.json();
        
        if (data.success) {
            const select = document.getElementById('breedSelect');
            data.breeds.forEach(breed => {
                const option = document.createElement('option');
                option.value = breed.breed;
                option.textContent = breed.breed;
                select.appendChild(option);
            });
            
            // 加载默认价格趋势
            loadPriceTrend();
        }
    } catch (error) {
        console.error('加载品种选项失败:', error);
    }
}

// 加载价格趋势
async function loadPriceTrend() {
    try {
        const breedName = document.getElementById('breedSelect').value;
        const dateRange = document.getElementById('dateRange').value;
        
        let url = `/api/analytics/price-trend?date_range=${dateRange}`;
        if (breedName) {
            url += `&breed_name=${encodeURIComponent(breedName)}`;
        }
        
        const response = await fetch(url);
        const data = await response.json();
        
        if (data.success && data.data.length > 0) {
            renderPriceTrendChart(data.data, breedName || '所有品种');
        } else {
            document.getElementById('priceTrendChart').innerHTML = 
                '<div class="text-center text-muted py-5">暂无数据</div>';
        }
    } catch (error) {
        console.error('加载价格趋势失败:', error);
        document.getElementById('priceTrendChart').innerHTML = 
            '<div class="text-center text-danger py-5">加载失败</div>';
    }
}

// 渲染价格趋势图表
function renderPriceTrendChart(data, title) {
    const dates = data.map(item => item.stat_date);
    const prices = data.map(item => item.avg_price);
    
    const chartHtml = `
        <div style="height: 400px; display: flex; flex-direction: column; justify-content: center;">
            <h6 class="text-center mb-3">${title} - 平均价格趋势</h6>
            <svg width="100%" height="300" viewBox="0 0 800 300">
                <!-- 网格线 -->
                ${generateGridLines(prices)}
                
                <!-- 折线 -->
                <polyline 
                    fill="none" 
                    stroke="#667eea" 
                    stroke-width="2"
                    points="${generatePolylinePoints(dates, prices, 800, 300)}"
                />
                
                <!-- 数据点 -->
                ${generateDataPoints(dates, prices, 800, 300)}
            </svg>
            <div class="d-flex justify-content-between mt-2 text-muted small">
                <span>${dates[0]}</span>
                <span>${dates[dates.length - 1]}</span>
            </div>
        </div>
    `;
    
    document.getElementById('priceTrendChart').innerHTML = chartHtml;
}

function generateGridLines(prices) {
    const minPrice = Math.min(...prices) * 0.9;
    const maxPrice = Math.max(...prices) * 1.1;
    const range = maxPrice - minPrice;
    
    let lines = '';
    for (let i = 0; i <= 4; i++) {
        const y = 20 + (i * 65);
        const price = maxPrice - (i * range / 4);
        lines += `<line x1="50" y1="${y}" x2="780" y2="${y}" stroke="#e0e0e0" stroke-dasharray="5,5"/>`;
        lines += `<text x="45" y="${y + 5}" text-anchor="end" font-size="12" fill="#666">¥${price.toFixed(0)}</text>`;
    }
    return lines;
}

function generatePolylinePoints(dates, prices, width, height) {
    const minPrice = Math.min(...prices) * 0.9;
    const maxPrice = Math.max(...prices) * 1.1;
    const range = maxPrice - minPrice;
    
    return dates.map((date, i) => {
        const x = 50 + (i / (dates.length - 1)) * (width - 70);
        const y = 20 + ((maxPrice - prices[i]) / range) * (height - 60);
        return `${x},${y}`;
    }).join(' ');
}

function generateDataPoints(dates, prices, width, height) {
    const minPrice = Math.min(...prices) * 0.9;
    const maxPrice = Math.max(...prices) * 1.1;
    const range = maxPrice - minPrice;
    
    return dates.map((date, i) => {
        const x = 50 + (i / (dates.length - 1)) * (width - 70);
        const y = 20 + ((maxPrice - prices[i]) / range) * (height - 60);
        return `<circle cx="${x}" cy="${y}" r="4" fill="#667eea" stroke="white" stroke-width="2"/>`;
    }).join('');
}

// 加载品种热度排行
async function loadBreedPopularity() {
    try {
        const response = await fetch('/api/analytics/breed-popularity?limit=10');
        const data = await response.json();
        
        if (data.success && data.data.length > 0) {
            const html = `
                <div class="list-group">
                    ${data.data.map((breed, index) => `
                        <div class="list-group-item">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <span class="badge bg-primary me-2">#${index + 1}</span>
                                    <strong>${escapeHtml(breed.breed_name)}</strong>
                                    <small class="text-muted ms-2">${escapeHtml(breed.total_records)} 条记录</small>
                                </div>
                                <div class="text-end">
                                    <div class="fw-bold">¥${escapeHtml(breed.avg_price.toFixed(0))}</div>
                                    <small class="trend-${escapeHtml(breed.trend) || 'stable'}">
                                        ${getTrendIcon(breed.trend)} ${escapeHtml(breed.popularity_score.toFixed(1))}分
                                    </small>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            document.getElementById('breedPopularityList').innerHTML = html;
        } else {
            document.getElementById('breedPopularityList').innerHTML = 
                '<div class="text-center text-muted py-5">暂无数据</div>';
        }
    } catch (error) {
        console.error('加载品种热度失败:', error);
    }
}

function getTrendIcon(trend) {
    if (trend === 'up') return '↑';
    if (trend === 'down') return '↓';
    return '→';
}

// 加载每日汇总报告
async function loadDailyReport() {
    try {
        const response = await fetch('/api/analytics/daily-report');
        const data = await response.json();
        
        if (data.success) {
            const report = data.data;
            const html = `
                <div class="row">
                    <div class="col-md-6">
                        <h6 class="mb-3">数据质量</h6>
                        <ul class="list-unstyled">
                            <li>总记录数: <strong>${report.data_quality.total_records}</strong></li>
                            <li>数据新鲜度: <strong>${report.data_quality.freshness.toFixed(1)}%</strong></li>
                            <li>质量评分: <strong>${report.data_quality.quality_score.toFixed(1)}</strong></li>
                        </ul>
                    </div>
                    <div class="col-md-6">
                        <h6 class="mb-3">热门品种 TOP 5</h6>
                        <ol class="list-unstyled">
                            ${report.top_breeds.slice(0, 5).map(breed => `
                                <li>${escapeHtml(breed.name)} - ¥${escapeHtml(breed.avg_price.toFixed(0))}</li>
                            `).join('')}
                        </ol>
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-md-6">
                        <h6 class="mb-2 text-success">价格上涨品种</h6>
                        <ul class="list-unstyled">
                            ${report.price_trends.trending_up.map(item => `
                                <li><span class="trend-up">↑</span> ${escapeHtml(item.name)} (+${escapeHtml(item.change.toFixed(1))}%)</li>
                            `).join('') || '<li class="text-muted">无</li>'}
                        </ul>
                    </div>
                    <div class="col-md-6">
                        <h6 class="mb-2 text-danger">价格下跌品种</h6>
                        <ul class="list-unstyled">
                            ${report.price_trends.trending_down.map(item => `
                                <li><span class="trend-down">↓</span> ${escapeHtml(item.name)} (${escapeHtml(item.change.toFixed(1))}%)</li>
                            `).join('') || '<li class="text-muted">无</li>'}
                        </ul>
                    </div>
                </div>
            `;
            document.getElementById('dailyReport').innerHTML = html;
        } else {
            document.getElementById('dailyReport').innerHTML = 
                '<div class="text-center text-muted py-5">暂无报告数据</div>';
        }
    } catch (error) {
        console.error('加载每日报告失败:', error);
    }
}

// 手动触发数据收集
async function collectAnalytics() {
    try {
        const button = event.target;
        button.disabled = true;
        button.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>收集中...';
        
        const response = await fetch('/api/analytics/collect', {
            method: 'POST'
        });
        const data = await response.json();
        
        if (data.success) {
            alert('数据收集完成！');
            loadAllData();
        } else {
            alert('数据收集失败: ' + data.error);
        }
    } catch (error) {
        console.error('数据收集失败:', error);
        alert('数据收集失败');
    } finally {
        const button = event.target;
        button.disabled = false;
        button.innerHTML = '<i class="bi bi-arrow-repeat"></i> 立即收集数据';
    }
}

// 刷新所有数据
function refreshAllData() {
    loadAllData();
}
</script>
{% endblock %}
