<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpine.js 组件演示</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- 自定义组件库 -->
    <script src="/static/JS/alpine-components.js"></script>
    
    <style>
        [x-cloak] { display: none !important; }
        
        .fade-enter-active, .fade-leave-active {
            transition: opacity 0.3s ease;
        }
        .fade-enter-from, .fade-leave-to {
            opacity: 0;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    
    <!-- 导航栏 -->
    <nav class="bg-white shadow-md" x-data="languageSwitcher()" @click.outside="closeDropdown()">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <h1 class="text-xl font-bold text-gray-800">🐶 狗狗数据看板</h1>
                </div>
                
                <div class="flex items-center space-x-4">
                    <!-- 语言切换下拉菜单 -->
                    <div class="relative">
                        <button 
                            @click="toggleDropdown()"
                            class="flex items-center space-x-2 px-4 py-2 rounded-lg hover:bg-gray-100 transition-colors"
                        >
                            <span x-text="currentLangInfo.flag"></span>
                            <span x-text="currentLangInfo.name"></span>
                            <svg class="w-4 h-4" :class="{ 'rotate-180': isOpen }" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </button>
                        
                        <!-- 下拉选项 -->
                        <div 
                            x-show="isOpen"
                            x-transition:enter="transition ease-out duration-200"
                            x-transition:enter-start="opacity-0 scale-95"
                            x-transition:enter-end="opacity-100 scale-100"
                            x-transition:leave="transition ease-in duration-150"
                            x-transition:leave-start="opacity-100 scale-100"
                            x-transition:leave-end="opacity-0 scale-95"
                            class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg py-2 z-50"
                            x-cloak
                        >
                            <template x-for="lang in supportedLangs" :key="lang.code">
                                <button
                                    @click="setLanguage(lang.code)"
                                    class="w-full text-left px-4 py-2 hover:bg-gray-100 flex items-center space-x-2"
                                    :class="{ 'bg-blue-50 text-blue-600': currentLang === lang.code }"
                                >
                                    <span x-text="lang.flag"></span>
                                    <span x-text="lang.name"></span>
                                    <span x-show="currentLang === lang.code" class="ml-auto text-blue-600">✓</span>
                                </button>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- 页面标题 -->
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-gray-900">Alpine.js 组件演示</h2>
            <p class="mt-2 text-gray-600">展示常用的 Alpine.js 组件和交互模式</p>
        </div>

        <!-- 统计卡片网格 -->
        <section class="mb-12">
            <h3 class="text-xl font-semibold text-gray-800 mb-4">📊 统计卡片组件</h3>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <!-- 卡片 1 -->
                <div 
                    x-data="statCard('狗狗总数', '1,234', '🐕', { value: '+12%', direction: 'up' })"
                    class="bg-white rounded-lg shadow-md p-6 hover:shadow-lg transition-shadow"
                >
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-600" x-text="title"></p>
                            <p class="text-2xl font-bold text-gray-900 mt-1" x-text="value"></p>
                            
                            <div x-show="trend" class="mt-2 flex items-center text-sm">
                                <span :class="trendColor" x-text="trendIcon + ' ' + trend.value"></span>
                            </div>
                        </div>
                        <div class="text-4xl" x-text="icon"></div>
                    </div>
                    
                    <button 
                        @click="refresh()"
                        class="mt-4 text-sm text-blue-600 hover:text-blue-800 flex items-center"
                        :disabled="isLoading"
                    >
                        <svg x-show="isLoading" class="animate-spin h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        <span x-text="isLoading ? '刷新中...' : '刷新'"></span>
                    </button>
                </div>

                <!-- 卡片 2 -->
                <div 
                    x-data="statCard('平均价格', '¥2,580', '💰', { value: '-3%', direction: 'down' })"
                    class="bg-white rounded-lg shadow-md p-6 hover:shadow-lg transition-shadow"
                >
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-600" x-text="title"></p>
                            <p class="text-2xl font-bold text-gray-900 mt-1" x-text="value"></p>
                            
                            <div x-show="trend" class="mt-2 flex items-center text-sm">
                                <span :class="trendColor" x-text="trendIcon + ' ' + trend.value"></span>
                            </div>
                        </div>
                        <div class="text-4xl" x-text="icon"></div>
                    </div>
                    
                    <button 
                        @click="refresh()"
                        class="mt-4 text-sm text-blue-600 hover:text-blue-800 flex items-center"
                        :disabled="isLoading"
                    >
                        <svg x-show="isLoading" class="animate-spin h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        <span x-text="isLoading ? '刷新中...' : '刷新'"></span>
                    </button>
                </div>

                <!-- 卡片 3 -->
                <div 
                    x-data="statCard('店铺总数', '156', '🏪')"
                    class="bg-white rounded-lg shadow-md p-6 hover:shadow-lg transition-shadow"
                >
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-600" x-text="title"></p>
                            <p class="text-2xl font-bold text-gray-900 mt-1" x-text="value"></p>
                        </div>
                        <div class="text-4xl" x-text="icon"></div>
                    </div>
                    
                    <button 
                        @click="refresh()"
                        class="mt-4 text-sm text-blue-600 hover:text-blue-800 flex items-center"
                        :disabled="isLoading"
                    >
                        <svg x-show="isLoading" class="animate-spin h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        <span x-text="isLoading ? '刷新中...' : '刷新'"></span>
                    </button>
                </div>

                <!-- 卡片 4 -->
                <div 
                    x-data="statCard('品种总数', '89', '📋', { value: '+5%', direction: 'up' })"
                    class="bg-white rounded-lg shadow-md p-6 hover:shadow-lg transition-shadow"
                >
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-600" x-text="title"></p>
                            <p class="text-2xl font-bold text-gray-900 mt-1" x-text="value"></p>
                            
                            <div x-show="trend" class="mt-2 flex items-center text-sm">
                                <span :class="trendColor" x-text="trendIcon + ' ' + trend.value"></span>
                            </div>
                        </div>
                        <div class="text-4xl" x-text="icon"></div>
                    </div>
                    
                    <button 
                        @click="refresh()"
                        class="mt-4 text-sm text-blue-600 hover:text-blue-800 flex items-center"
                        :disabled="isLoading"
                    >
                        <svg x-show="isLoading" class="animate-spin h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        <span x-text="isLoading ? '刷新中...' : '刷新'"></span>
                    </button>
                </div>
            </div>
        </section>

        <!-- 反馈表单 -->
        <section class="mb-12">
            <h3 class="text-xl font-semibold text-gray-800 mb-4">📝 反馈表单组件</h3>
            
            <div 
                x-data="feedbackForm()"
                class="bg-white rounded-lg shadow-md p-6"
            >
                <form @submit.prevent="submit()">
                    <!-- 反馈类型 -->
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">反馈类型</label>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                            <template x-for="type in types" :key="type.value">
                                <button
                                    type="button"
                                    @click="formData.type = type.value"
                                    class="px-4 py-2 rounded-lg border-2 transition-colors"
                                    :class="formData.type === type.value ? 'border-blue-500 bg-blue-50' : 'border-gray-200 hover:border-gray-300'"
                                >
                                    <span x-text="type.icon + ' ' + type.label"></span>
                                </button>
                            </template>
                        </div>
                    </div>

                    <!-- 标题 -->
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">标题（可选）</label>
                        <input 
                            type="text" 
                            x-model="formData.title"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                            placeholder="简要描述您的问题或建议"
                            maxlength="200"
                        >
                        <p x-show="errors.title" class="mt-1 text-sm text-red-600" x-text="errors.title"></p>
                    </div>

                    <!-- 内容 -->
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            详细内容 <span class="text-red-500">*</span>
                        </label>
                        <textarea 
                            x-model="formData.content"
                            rows="6"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                            placeholder="请详细描述您遇到的问题或建议..."
                            required
                        ></textarea>
                        <div class="mt-1 flex justify-between text-sm">
                            <p x-show="errors.content" class="text-red-600" x-text="errors.content"></p>
                            <p class="text-gray-500">
                                <span x-text="charCount"></span> / 5000
                            </p>
                        </div>
                    </div>

                    <!-- 优先级 -->
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">优先级</label>
                        <div class="flex space-x-3">
                            <template x-for="priority in priorities" :key="priority.value">
                                <button
                                    type="button"
                                    @click="formData.priority = priority.value"
                                    class="px-4 py-2 rounded-lg border-2 transition-colors"
                                    :class="formData.priority === priority.value ? 
                                        `border-${priority.color}-500 bg-${priority.color}-50` : 
                                        'border-gray-200 hover:border-gray-300'"
                                >
                                    <span x-text="priority.label"></span>
                                </button>
                            </template>
                        </div>
                    </div>

                    <!-- 联系邮箱 -->
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">联系邮箱（可选）</label>
                        <input 
                            type="email" 
                            x-model="formData.contact_email"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                            placeholder="方便我们回复您"
                        >
                        <p x-show="errors.contact_email" class="mt-1 text-sm text-red-600" x-text="errors.contact_email"></p>
                    </div>

                    <!-- 提交按钮 -->
                    <div class="flex items-center justify-between">
                        <button
                            type="submit"
                            :disabled="isSubmitting"
                            class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center"
                        >
                            <svg x-show="isSubmitting" class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            <span x-text="isSubmitting ? '提交中...' : '提交反馈'"></span>
                        </button>
                        
                        <button
                            type="button"
                            @click="resetForm()"
                            class="px-4 py-2 text-gray-600 hover:text-gray-800"
                        >
                            重置
                        </button>
                    </div>
                </form>

                <!-- 提交结果 -->
                <div x-show="submitResult" x-transition class="mt-4 p-4 rounded-lg"
                     :class="submitResult?.success ? 'bg-green-50 border border-green-200' : 'bg-red-50 border border-red-200'">
                    <p :class="submitResult?.success ? 'text-green-800' : 'text-red-800'" 
                       x-text="submitResult?.message"></p>
                </div>
            </div>
        </section>

        <!-- 通知系统演示 -->
        <section class="mb-12">
            <h3 class="text-xl font-semibold text-gray-800 mb-4">🔔 通知系统</h3>
            
            <div x-data="notificationSystem()" class="space-x-3">
                <button 
                    @click="success('操作成功！')"
                    class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700"
                >
                    成功通知
                </button>
                
                <button 
                    @click="error('操作失败，请重试')"
                    class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700"
                >
                    错误通知
                </button>
                
                <button 
                    @click="info('这是一条提示信息')"
                    class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
                >
                    信息通知
                </button>
            </div>
        </section>

        <!-- 工具函数演示 -->
        <section>
            <h3 class="text-xl font-semibold text-gray-800 mb-4">🛠️ 工具函数</h3>
            
            <div class="bg-white rounded-lg shadow-md p-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <p class="text-sm text-gray-600">格式化数字：</p>
                        <p class="text-lg font-mono" x-text="AlpineUtils.formatNumber(1234567)"></p>
                    </div>
                    
                    <div>
                        <p class="text-sm text-gray-600">格式化日期：</p>
                        <p class="text-lg font-mono" x-text="AlpineUtils.formatDate(new Date())"></p>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- 通知容器 -->
    <div 
        x-data="notificationSystem()"
        class="fixed top-4 right-4 space-y-2 z-50"
    >
        <template x-for="notification in notifications" :key="notification.id">
            <div 
                x-show="notification.visible"
                x-transition:enter="transition ease-out duration-300"
                x-transition:enter-start="opacity-0 translate-x-8"
                x-transition:enter-end="opacity-100 translate-x-0"
                x-transition:leave="transition ease-in duration-200"
                x-transition:leave-start="opacity-100 translate-x-0"
                x-transition:leave-end="opacity-0 translate-x-8"
                class="px-6 py-3 rounded-lg shadow-lg text-white"
                :class="{
                    'bg-green-500': notification.type === 'success',
                    'bg-red-500': notification.type === 'error',
                    'bg-blue-500': notification.type === 'info'
                }"
                x-text="notification.message"
            ></div>
        </template>
    </div>

</body>
</html>
