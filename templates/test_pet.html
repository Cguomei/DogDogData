<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2.5D 宠物测试 - v2.5.1</title>
    <!-- 使用本地 Bootstrap 避免 CDN 被拦截 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/css/pet.css?v=2.5.1">
</head>
<body>
    <div class="container mt-5">
        <h1>🐶 2.5D 宠物功能测试 <small class="text-muted">v2.5.1</small></h1>
        <p>如果宠物正常显示，你应该在右下角看到一只小狗</p>
        
        <div class="alert alert-info">
            <strong>测试项目：</strong>
            <ul>
                <li>✅ 移动鼠标 → 宠物应该跟随旋转（2.5D 效果）</li>
                <li>✅ 点击宠物 → 应该有涟漪特效和对话气泡</li>
                <li>✅ 双击宠物 → 应该 360°旋转</li>
            </ul>
        </div>
        
        <div id="button-container">
            <button class="btn btn-primary" onclick="safeCall('show')">召唤宠物</button>
            <button class="btn btn-secondary" onclick="safeCall('hide')">隐藏宠物</button>
            <button class="btn btn-warning" onclick="safeCall('feed')">喂食</button>
            <button class="btn btn-success" onclick="safeCall('play')">玩耍</button>
        </div>
        
        <div id="status" class="mt-3"></div>
    </div>
    
    <!-- 添加版本号强制刷新缓存 -->
    <script src="/static/js/pet.js?v=2.5.1"></script>
    <script>
        // 安全调用函数，避免报错
        function safeCall(methodName) {
            const statusDiv = document.getElementById('status');
            if (window.virtualPet && typeof window.virtualPet[methodName] === 'function') {
                try {
                    window.virtualPet[methodName]();
                    statusDiv.className = 'mt-3 alert alert-success';
                    statusDiv.innerHTML = `✅ ${methodName}() 执行成功`;
                } catch (error) {
                    statusDiv.className = 'mt-3 alert alert-danger';
                    statusDiv.innerHTML = `❌ ${methodName}() 执行失败：${error.message}`;
                }
            } else {
                statusDiv.className = 'mt-3 alert alert-warning';
                statusDiv.innerHTML = `⚠️ 宠物未初始化或方法不存在：<code>window.virtualPet.${methodName}</code>`;
                console.log('virtualPet 状态:', window.virtualPet);
            }
        }
        
        // 页面加载完成后检查宠物状态
        setTimeout(() => {
            const statusDiv = document.getElementById('status');
            if (window.virtualPet) {
                statusDiv.className = 'mt-3 alert alert-success';
                statusDiv.innerHTML = '✅ 小宠物已就绪！当前状态：<br>' +
                    `<strong>饥饿:</strong> ${window.virtualPet.state.hunger}% | ` +
                    `<strong>活力:</strong> ${window.virtualPet.state.energy}% | ` +
                    `<strong>心情:</strong> ${window.virtualPet.state.mood}`;
            } else {
                statusDiv.className = 'mt-3 alert alert-danger';
                statusDiv.innerHTML = '❌ 小宠物未初始化！请检查控制台日志。';
            }
        }, 2000);
    </script>
</body>
</html>
