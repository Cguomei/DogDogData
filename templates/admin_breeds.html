{% extends "base.html" %}

{% block title %}品种管理 - 狗狗数据分析{% endblock %}

{% block content %}
<div class="row mb-4">
    <h2 class="text-center">📋 品种数据管理</h2>
    <p class="text-center text-muted">在这里可以增、删、改、查狗狗品种</p>
</div>

<button type="button" class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#addModal">
    ➕ 新增品种
</button>

<table class="table table-striped" id="breed-admin-table">
    <thead>
        <tr>
            <th>ID</th>
            <th>品种名</th>
            <th>平均寿命(年)</th>
            <th>体型</th>
            <th>人气值</th>
            <th>操作</th>
        </tr>
    </thead>
    <tbody id="admin-breed-tbody">
        <tr><td colspan="6" class="text-center">加载中...</td></tr>
    </tbody>
</table>

<!-- 新增模态框 -->
<div class="modal fade" id="addModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">新增品种</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
            </div>
            <div class="modal-body">
                <form id="addForm">
                    <div class="mb-3">
                        <label for="breed_name" class="form-label">品种名</label>
                        <input type="text" class="form-control" id="breed_name" required>
                    </div>
                    <div class="mb-3">
                        <label for="avg_life_years" class="form-label">平均寿命(年)</label>
                        <input type="number" step="0.1" class="form-control" id="avg_life_years">
                    </div>
                    <div class="mb-3">
                        <label for="size_category" class="form-label">体型</label>
                        <select class="form-control" id="size_category">
                            <option value="">-- 请选择 --</option>
                            <option value="小型">小型</option>
                            <option value="中型">中型</option>
                            <option value="大型">大型</option>
                            <option value="超大型">超大型</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="popularity" class="form-label">人气值</label>
                        <input type="number" class="form-control" id="popularity" value="0">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="saveAddBtn">保存</button>
            </div>
        </div>
    </div>
</div>

<!-- 编辑模态框 -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">编辑品种</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
            </div>
            <div class="modal-body">
                <form id="editForm">
                    <input type="hidden" id="edit_id">
                    <div class="mb-3">
                        <label for="edit_breed_name" class="form-label">品种名</label>
                        <input type="text" class="form-control" id="edit_breed_name" required>
                    </div>
                    <div class="mb-3">
                        <label for="edit_avg_life_years" class="form-label">平均寿命(年)</label>
                        <input type="number" step="0.1" class="form-control" id="edit_avg_life_years">
                    </div>
                    <div class="mb-3">
                        <label for="edit_size_category" class="form-label">体型</label>
                        <select class="form-control" id="edit_size_category">
                            <option value="">-- 请选择 --</option>
                            <option value="小型">小型</option>
                            <option value="中型">中型</option>
                            <option value="大型">大型</option>
                            <option value="超大型">超大型</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="edit_popularity" class="form-label">人气值</label>
                        <input type="number" class="form-control" id="edit_popularity">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="saveEditBtn">保存修改</button>
            </div>
        </div>
    </div>
</div>

<script>
var breedTable = null;

function getCSRFToken() {
    return document.querySelector('meta[name="csrf-token"]').getAttribute('content');
}

function loadBreeds() {
    fetch('/api/breeds')
        .then(function(res) { return res.json(); })
        .then(function(data) {
            var tbody = document.getElementById('admin-breed-tbody');
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center">暂无数据</td></tr>';
                if (breedTable) { breedTable.destroy(); breedTable = null; }
            } else {
                tbody.innerHTML = data.map(function(b) {
                    return '<tr>' +
                        '<td>' + escapeHtml(b.id) + '</td>' +
                        '<td>' + escapeHtml(b.breed_name) + '</td>' +
                        '<td>' + (escapeHtml(b.avg_life_years) || '-') + '</td>' +
                        '<td>' + (escapeHtml(b.size_category) || '-') + '</td>' +
                        '<td>' + escapeHtml(b.popularity) + '</td>' +
                        '<td>' +
                            '<button class="btn btn-sm btn-warning" onclick="editBreed(' + escapeHtml(b.id) + ')">编辑</button> ' +
                            '<button class="btn btn-sm btn-danger" onclick="deleteBreed(' + escapeHtml(b.id) + ')">删除</button>' +
                        '</td>' +
                    '</tr>';
                }).join('');
                if (breedTable) { breedTable.destroy(); }
                breedTable = $('#breed-admin-table').DataTable({
                    language: {
                        search: '搜索：',
                        lengthMenu: '每页 _MENU_ 条',
                        info: '显示 _START_ 到 _END_ 条，共 _TOTAL_ 条',
                        paginate: { first: '首页', last: '末页', next: '下一页', previous: '上一页' }
                    },
                    pageLength: 20,
                    lengthMenu: [10, 20, 50, 100],
                    order: [[0, 'asc']]
                });
            }
        });
}

document.getElementById('saveAddBtn').addEventListener('click', function() {
    var data = {
        breed_name: document.getElementById('breed_name').value,
        avg_life_years: document.getElementById('avg_life_years').value || null,
        size_category: document.getElementById('size_category').value || null,
        popularity: parseInt(document.getElementById('popularity').value) || 0
    };
    fetch('/api/breeds', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCSRFToken()
        },
        body: JSON.stringify(data)
    })
    .then(function(res) { return res.json(); })
    .then(function(res) {
        if (res.id) {
            var modal = bootstrap.Modal.getInstance(document.getElementById('addModal'));
            if (modal) modal.hide();
            loadBreeds();
            document.getElementById('addForm').reset();
        } else {
            alert(res.error || '添加失败');
        }
    })
    .catch(function(err) {
        console.error(err);
        alert('请求失败，请稍后重试');
    });
});

function deleteBreed(id) {
    if (!confirm('确定要删除该品种吗？')) return;
    fetch('/api/breeds/' + id, {
        method: 'DELETE',
        headers: { 'X-CSRFToken': getCSRFToken() }
    })
    .then(function(res) { return res.json(); })
    .then(function(res) {
        if (res.message) { loadBreeds(); }
        else { alert(res.error || '删除失败'); }
    })
    .catch(function(err) {
        console.error(err);
        alert('删除请求失败，请稍后重试');
    });
}

function editBreed(id) {
    fetch('/api/breeds/' + id)
        .then(function(res) { return res.json(); })
        .then(function(b) {
            document.getElementById('edit_id').value = b.id;
            document.getElementById('edit_breed_name').value = b.breed_name;
            document.getElementById('edit_avg_life_years').value = b.avg_life_years || '';
            document.getElementById('edit_size_category').value = b.size_category || '';
            document.getElementById('edit_popularity').value = b.popularity;
            $('#editModal').modal('show');
        });
}

document.getElementById('saveEditBtn').addEventListener('click', function() {
    var id = document.getElementById('edit_id').value;
    var data = {
        breed_name: document.getElementById('edit_breed_name').value,
        avg_life_years: document.getElementById('edit_avg_life_years').value || null,
        size_category: document.getElementById('edit_size_category').value || null,
        popularity: parseInt(document.getElementById('edit_popularity').value) || 0
    };
    fetch('/api/breeds/' + id, {
        method: 'PUT',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCSRFToken()
        },
        body: JSON.stringify(data)
    })
    .then(function(res) { return res.json(); })
    .then(function(res) {
        if (res.message) {
            $('#editModal').modal('hide');
            loadBreeds();
        } else {
            alert(res.error || '更新失败');
        }
    });
});

loadBreeds();
</script>
{% endblock %}
