<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI智能助手 - 狗狗数据分析</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .chat-container {
            width: 90%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .chat-header h2 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .chat-header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .model-status {
            font-size: 12px;
            margin-top: 5px;
            padding: 4px 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            display: inline-block;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        
        .message {
            margin-bottom: 20px;
            display: flex;
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            flex-direction: row-reverse;
        }
        
        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin: 0 10px;
            flex-shrink: 0;
        }
        
        .message.user .message-avatar {
            background: #667eea;
        }
        
        .message.ai .message-avatar {
            background: #48bb78;
        }
        
        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.6;
        }
        
        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.ai .message-content {
            background: white;
            color: #333;
            border: 1px solid #e2e8f0;
            border-bottom-left-radius: 4px;
        }
        
        .quick-questions {
            padding: 15px 20px;
            background: white;
            border-top: 1px solid #e2e8f0;
        }
        
        .quick-questions h4 {
            font-size: 14px;
            color: #718096;
            margin-bottom: 10px;
        }
        
        .quick-btn {
            display: inline-block;
            padding: 8px 16px;
            margin: 5px;
            background: #edf2f7;
            border: 1px solid #cbd5e0;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .quick-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .chat-input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
        }
        
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .chat-input:focus {
            border-color: #667eea;
        }
        
        .send-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        
        .send-btn:hover {
            transform: scale(1.05);
        }
        
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 10px;
        }
        
        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #cbd5e0;
            animation: typing 1.4s infinite;
        }
        
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        
        .welcome-message {
            text-align: center;
            padding: 40px 20px;
            color: #718096;
        }
        
        .welcome-message h3 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #2d3748;
        }
        
        .error-message {
            background: #fed7d7;
            color: #c53030;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- 头部 -->
        <div class="chat-header">
            <h2>🤖 AI智能宠物顾问</h2>
            <p>问我任何关于狗狗的问题</p>
            <div class="model-status" id="modelStatus">检查模型状态...</div>
            <div style="margin-top: 10px;">
                <a href="/ai-knowledge" style="color: white; font-size: 12px; text-decoration: underline;">
                    📚 查看知识库
                </a>
                <span id="kbStats" style="color: rgba(255,255,255,0.8); font-size: 12px; margin-left: 10px;"></span>
            </div>
        </div>
        
        <!-- 消息区域 -->
        <div class="chat-messages" id="chatMessages">
            <div class="welcome-message">
                <h3>你好！我是你的AI宠物顾问 👋</h3>
                <p>我可以帮你查询价格、了解品种、获取养护建议...</p>
                <p style="margin-top: 10px; font-size: 14px;">试试下面的快捷问题开始吧！</p>
            </div>
        </div>
        
        <!-- 快捷问题 -->
        <div class="quick-questions">
            <h4>💡 快捷提问：</h4>
            <button class="quick-btn" onclick="sendQuickQuestion('金毛的价格是多少？')">金毛价格</button>
            <button class="quick-btn" onclick="sendQuickQuestion('适合新手养的狗狗')">新手推荐</button>
            <button class="quick-btn" onclick="sendQuickQuestion('金毛和泰迪对比')">品种对比</button>
            <button class="quick-btn" onclick="sendQuickQuestion('泰迪有什么特点？')">泰迪介绍</button>
        </div>
        
        <!-- 输入区域 -->
        <div class="chat-input-area">
            <input 
                type="text" 
                class="chat-input" 
                id="chatInput" 
                placeholder="输入您的问题..."
                onkeypress="handleKeyPress(event)"
            >
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
        </div>
    </div>
    
    <script>
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const modelStatus = document.getElementById('modelStatus');
        
        // 检查模型状态
        checkModelStatus();
        loadKnowledgeStats();
        
        async function checkModelStatus() {
            try {
                const response = await fetch('/api/ai/model/status');
                const data = await response.json();
                
                if (data.status === 'online') {
                    modelStatus.textContent = `✅ ${data.type} 已连接`;
                    modelStatus.style.background = 'rgba(72, 187, 120, 0.3)';
                } else {
                    modelStatus.textContent = `❌ 模型未启动`;
                    modelStatus.style.background = 'rgba(245, 101, 101, 0.3)';
                }
            } catch (error) {
                modelStatus.textContent = '⚠️ 无法连接';
                modelStatus.style.background = 'rgba(245, 101, 101, 0.3)';
            }
        }
        
        // 加载知识库统计
        async function loadKnowledgeStats() {
            try {
                const response = await fetch('/api/ai/knowledge/stats');
                const data = await response.json();
                
                if (data.success) {
                    const stats = data.stats;
                    const kbStatsElement = document.getElementById('kbStats');
                    kbStatsElement.textContent = `📚 知识: ${stats.total_knowledge}条 | 命中率: ${stats.hit_rate}`;
                }
            } catch (error) {
                console.error('加载知识库统计失败:', error);
            }
        }
        
        // 发送消息
        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message) return;
            
            // 清空输入框
            chatInput.value = '';
            
            // 显示用户消息
            addMessage(message, 'user');
            
            // 显示加载状态
            showTypingIndicator();
            
            // 禁用发送按钮
            sendBtn.disabled = true;
            
            try {
                // 调用API
                const response = await fetch('/api/ai/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: message })
                });
                
                console.log('响应状态:', response.status);
                
                // 检查HTTP状态
                if (response.status === 401) {
                    hideTypingIndicator();
                    addMessage('❌ 请先登录再使用AI助手', 'ai');
                    // 跳转到登录页
                    setTimeout(() => {
                        window.location.href = '/login?next=/ai-chat';
                    }, 2000);
                    return;
                }
                
                if (!response.ok) {
                    hideTypingIndicator();
                    addMessage(`❌ 服务器错误 (${response.status})`, 'ai');
                    return;
                }
                
                const data = await response.json();
                console.log('响应数据:', data);
                
                // 隐藏加载状态
                hideTypingIndicator();
                
                if (data.success) {
                    // 显示AI回复
                    addMessage(data.answer, 'ai');
                } else {
                    addMessage('❌ 错误：' + data.error, 'ai');
                }
            } catch (error) {
                console.error('请求失败:', error);
                hideTypingIndicator();
                addMessage('❌ 网络错误，请稍后重试', 'ai');
            } finally {
                sendBtn.disabled = false;
            }
        }
        
        // 添加消息到聊天区域
        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = sender === 'user' ? '👤' : '🤖';
            
            const content = document.createElement('div');
            content.className = 'message-content';
            content.innerHTML = formatMessage(text);
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(content);
            
            chatMessages.appendChild(messageDiv);
            
            // 滚动到底部
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        // 格式化消息（简单的Markdown支持）
        function formatMessage(text) {
            // 粗体
            text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            // 换行
            text = text.replace(/\n/g, '<br>');
            // 列表
            text = text.replace(/• (.*?)(?=<br>|$)/g, '<li>$1</li>');
            text = text.replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>');
            
            return text;
        }
        
        // 显示打字指示器
        function showTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message ai';
            typingDiv.id = 'typingIndicator';
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = '🤖';
            
            const content = document.createElement('div');
            content.className = 'message-content';
            content.innerHTML = `
                <div class="typing-indicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            
            typingDiv.appendChild(avatar);
            typingDiv.appendChild(content);
            
            chatMessages.appendChild(typingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        // 隐藏打字指示器
        function hideTypingIndicator() {
            const typingIndicator = document.getElementById('typingIndicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }
        
        // 快捷问题
        function sendQuickQuestion(question) {
            chatInput.value = question;
            sendMessage();
        }
        
        // 回车发送
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        // 页面加载完成后聚焦输入框
        window.onload = function() {
            chatInput.focus();
        };
    </script>
</body>
</html>
