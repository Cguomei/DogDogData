<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI助手日志查看器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            color: #4ec9b0;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        button {
            padding: 8px 16px;
            background: #0e639c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        
        button:hover {
            background: #1177bb;
        }
        
        button.danger {
            background: #c75450;
        }
        
        button.danger:hover {
            background: #d96965;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding: 15px;
            background: #252526;
            border-radius: 4px;
        }
        
        .stat-item {
            display: flex;
            flex-direction: column;
        }
        
        .stat-label {
            font-size: 12px;
            color: #858585;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #4ec9b0;
        }
        
        .stat-value.error {
            color: #f48771;
        }
        
        .stat-value.warning {
            color: #cca700;
        }
        
        .log-container {
            background: #1e1e1e;
            border: 1px solid #3c3c3c;
            border-radius: 4px;
            padding: 15px;
            max-height: 70vh;
            overflow-y: auto;
        }
        
        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid #2d2d2d;
            font-size: 13px;
            line-height: 1.5;
        }
        
        .log-entry:last-child {
            border-bottom: none;
        }
        
        .log-timestamp {
            color: #858585;
            margin-right: 10px;
        }
        
        .log-level {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            margin-right: 10px;
            font-weight: bold;
            font-size: 11px;
        }
        
        .log-level.INFO {
            background: #0e639c;
            color: white;
        }
        
        .log-level.WARNING {
            background: #cca700;
            color: black;
        }
        
        .log-level.ERROR {
            background: #c75450;
            color: white;
        }
        
        .log-message {
            color: #d4d4d4;
        }
        
        .error-traceback {
            margin-left: 20px;
            margin-top: 5px;
            padding: 10px;
            background: #2d2d2d;
            border-left: 3px solid #c75450;
            color: #ce9178;
            font-size: 12px;
            white-space: pre-wrap;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #858585;
        }
        
        .empty {
            text-align: center;
            padding: 40px;
            color: #858585;
        }
        
        .filter-buttons {
            display: flex;
            gap: 10px;
        }
        
        .filter-btn {
            background: #3c3c3c;
        }
        
        .filter-btn.active {
            background: #0e639c;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 AI助手日志查看器</h1>
        
        <div class="stats">
            <div class="stat-item">
                <span class="stat-label">总行数</span>
                <span class="stat-value" id="totalLines">-</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">错误数</span>
                <span class="stat-value error" id="errorCount">-</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">警告数</span>
                <span class="stat-value warning" id="warningCount">-</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">文件大小</span>
                <span class="stat-value" id="fileSize">-</span>
            </div>
        </div>
        
        <div class="controls">
            <button onclick="loadLogs()">🔄 刷新日志</button>
            <button onclick="loadErrors()" class="danger">⚠️ 只看错误</button>
            <button onclick="clearLogs()" class="danger">🗑️ 清空日志</button>
            <div class="filter-buttons">
                <button class="filter-btn active" onclick="setFilter('all')">全部</button>
                <button class="filter-btn" onclick="setFilter('ERROR')">错误</button>
                <button class="filter-btn" onclick="setFilter('WARNING')">警告</button>
                <button class="filter-btn" onclick="setFilter('INFO')">信息</button>
            </div>
        </div>
        
        <div class="log-container" id="logContainer">
            <div class="loading">加载中...</div>
        </div>
    </div>
    
    <script>
        let currentFilter = 'all';
        let allLogs = [];
        
        // 页面加载时获取日志
        window.onload = function() {
            loadLogs();
        };
        
        async function loadLogs() {
            showLoading();
            
            try {
                const response = await fetch('/api/ai/logs/recent?lines=200');
                const data = await response.json();
                
                if (data.success) {
                    updateStats(data);
                    allLogs = data.logs;
                    displayLogs(allLogs);
                } else {
                    showError('加载失败: ' + data.error);
                }
            } catch (error) {
                showError('网络错误: ' + error.message);
            }
        }
        
        async function loadErrors() {
            showLoading();
            
            try {
                const response = await fetch('/api/ai/logs/errors');
                const data = await response.json();
                
                if (data.success) {
                    updateStats({
                        total_lines: data.total_errors,
                        error_count: data.total_errors,
                        warning_count: 0,
                        file_size: 0
                    });
                    
                    // 转换错误格式为日志格式
                    const errorLogs = data.errors.map(err => ({
                        timestamp: err.timestamp,
                        level: 'ERROR',
                        message: err.message,
                        traceback: err.traceback
                    }));
                    
                    allLogs = errorLogs;
                    displayLogs(errorLogs);
                } else {
                    showError('加载失败: ' + data.error);
                }
            } catch (error) {
                showError('网络错误: ' + error.message);
            }
        }
        
        async function clearLogs() {
            if (!confirm('确定要清空所有日志吗？')) {
                return;
            }
            
            try {
                const response = await fetch('/api/ai/logs/clear', {
                    method: 'POST'
                });
                const data = await response.json();
                
                if (data.success) {
                    alert('日志已清空');
                    loadLogs();
                } else {
                    alert('清空失败: ' + data.error);
                }
            } catch (error) {
                alert('网络错误: ' + error.message);
            }
        }
        
        function setFilter(filter) {
            currentFilter = filter;
            
            // 更新按钮状态
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // 过滤并显示日志
            displayLogs(allLogs);
        }
        
        function updateStats(data) {
            document.getElementById('totalLines').textContent = data.total_lines || 0;
            document.getElementById('errorCount').textContent = data.error_count || 0;
            document.getElementById('warningCount').textContent = data.warning_count || 0;
            
            const size = data.file_size || 0;
            const sizeStr = size > 1024 * 1024 
                ? (size / 1024 / 1024).toFixed(2) + ' MB'
                : size > 1024 
                    ? (size / 1024).toFixed(2) + ' KB'
                    : size + ' B';
            document.getElementById('fileSize').textContent = sizeStr;
        }
        
        function displayLogs(logs) {
            const container = document.getElementById('logContainer');
            
            // 应用过滤器
            let filteredLogs = logs;
            if (currentFilter !== 'all') {
                filteredLogs = logs.filter(log => log.level === currentFilter);
            }
            
            if (filteredLogs.length === 0) {
                container.innerHTML = '<div class="empty">暂无日志</div>';
                return;
            }
            
            // 反转显示（最新的在前）
            const reversedLogs = [...filteredLogs].reverse();
            
            container.innerHTML = reversedLogs.map(log => {
                let html = '<div class="log-entry">';
                html += `<span class="log-timestamp">${escapeHtml(log.timestamp) || '-'}</span>`;
                html += `<span class="log-level ${escapeHtml(log.level)}">${escapeHtml(log.level) || 'UNKNOWN'}</span>`;
                html += `<span class="log-message">${escapeHtml(log.message || log.raw || '')}</span>`;
                
                // 如果有堆栈跟踪
                if (log.traceback && log.traceback.length > 0) {
                    html += `<div class="error-traceback">${escapeHtml(log.traceback.join('\n'))}</div>`;
                }
                
                html += '</div>';
                return html;
            }).join('');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showLoading() {
            document.getElementById('logContainer').innerHTML = '<div class="loading">加载中...</div>';
        }
        
        function showError(message) {
            document.getElementById('logContainer').innerHTML = `<div class="empty" style="color: #f48771;">${escapeHtml(message)}</div>`;
        }
    </script>
</body>
</html>
