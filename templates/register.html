{% extends "base.html" %}
{% block title %}注册 - 狗狗数据分析{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card" style="border-radius: var(--border-radius-lg); overflow: hidden;">
            <div class="card-header text-center" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); padding: 1.5rem;">
                <h2 class="mb-0" style="color: white; font-size: 1.8rem;">✨ 用户注册</h2>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-4">
                        <label for="username" class="form-label fw-bold">
                            <i class="bi bi-person-plus"></i> 用户名
                        </label>
                        <input type="text" class="form-control form-control-lg" id="username" name="username" required 
                               style="border-radius: 8px; border: 2px solid #e2e8f0; padding: 0.75rem 1rem;">
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-bold">
                            <i class="bi bi-key"></i> 密码
                        </label>
                        <input type="password" class="form-control form-control-lg" id="password" name="password" required 
                               minlength="6"
                               placeholder="请输入至少6位密码"
                               style="border-radius: 8px; border: 2px solid #e2e8f0; padding: 0.75rem 1rem;">
                        <small class="form-text text-muted mt-2">
                            <i class="bi bi-info-circle"></i> 密码要求：至少6位（可以包含字母、数字、特殊字符）
                        </small>
                    </div>
                    <button type="submit" class="btn btn-success w-100 btn-lg" 
                            style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); border: none; padding: 0.75rem; border-radius: 8px; font-weight: 600;">
                        <i class="bi bi-check-circle"></i> 立即注册
                    </button>
                </form>
                <div class="text-center mt-4">
                    <p class="mb-0 text-muted">已有账号？ 
                        <a href="{{ url_for('auth.login') }}" style="color: #4facfe; font-weight: 600; text-decoration: none;">
                            去登录 →
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
