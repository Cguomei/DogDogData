# ─── Test Strategy ──────────────────────────────────────────────
#   pytest              → 默认过滤慢速/E2E，秒级返回，开发专用
#   pytest -m "p0"      → P0 冒烟（核心功能）
#   pytest -m "e2e"     → 端到端测试（需要 Flask 服务 + Chrome）
#   pytest -m "slow"    → 性能/压测等慢速测试
#   pytest --all        → 全部测试（CI 完整流水线用）
# ────────────────────────────────────────────────────────────────

[pytest]
pythonpath = .
addopts = -v --strict-markers -m "not slow and not e2e and not performance"
testpaths = Test/
markers =
    p0: P0 - 核心功能冒烟测试
    p1: P1 - 重要功能测试
    p2: P2 - 次要功能测试
    slow: 慢速测试（性能、并发等）
    e2e: 端到端测试（需 Flask + Chrome）
    playwright: Playwright 浏览器测试
    api: API 接口测试
    ui: UI 界面测试
    alpine: Alpine.js 组件测试
    accessibility: 无障碍访问测试
    performance: 性能测试
    integration: 集成测试
    monitoring: 监控相关测试
    charts: 图表相关测试
