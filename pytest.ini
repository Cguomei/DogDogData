[pytest]
pythonpath = .
# pythonpath = . 确保 pytest 能够导入项目根目录下的模块（如 app, charts）
addopts = -v --strict-markers
testpaths = Test/
markers =
    slow: 标记慢速测试（如需要真实数据库的测试）
    playwright: 标记 Playwright E2E 测试
    e2e: 标记端到端测试
    p0: P0 优先级 - 核心功能冒烟测试
    p1: P1 优先级 - 重要功能测试
    p2: P2 优先级 - 次要功能测试
    api: 标记 API 接口测试
    ui: 标记 UI 界面测试
    performance: 标记性能测试
    integration: 标记集成测试
    monitoring: 标记监控相关测试
    charts: 标记图表相关测试
