<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 智能测试控制台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #1f2937;
        }
        
        .app-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 头部 */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #6b7280;
            font-size: 1.1em;
        }
        
        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 600;
            margin-top: 15px;
            font-size: 0.9em;
        }
        
        .status-badge.success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .status-badge.running {
            background: #fef3c7;
            color: #92400e;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        /* 控制面板 */
        .control-panel {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .panel-title {
            font-size: 1.5em;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .test-btn {
            padding: 15px 20px;
            border: none;
            border-radius: 12px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        .test-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        
        .test-btn:hover::before {
            left: 100%;
        }
        
        .test-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        
        .test-btn:active {
            transform: translateY(-1px);
        }
        
        .test-btn.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .test-btn.success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }
        
        .test-btn.warning {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        }
        
        .test-btn.info {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }
        
        .test-btn.danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }
        
        .test-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.15);
        }
        
        .stat-label {
            color: #6b7280;
            font-size: 0.9em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #1f2937;
        }
        
        .stat-value.success { color: #10b981; }
        .stat-value.danger { color: #ef4444; }
        .stat-value.warning { color: #f59e0b; }
        
        /* 模块列表 */
        .modules-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .module-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #f9fafb;
            border-radius: 10px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .module-item:hover {
            background: #f3f4f6;
            transform: translateX(5px);
        }
        
        .module-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .module-icon {
            font-size: 1.8em;
        }
        
        .module-name {
            font-weight: 600;
            color: #374151;
        }
        
        .module-count {
            color: #6b7280;
            font-size: 0.9em;
        }
        
        .module-status {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        
        .badge.success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .badge.pending {
            background: #fef3c7;
            color: #92400e;
        }
        
        /* 终端输出 */
        .terminal-section {
            background: #1f2937;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .terminal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            color: white;
        }
        
        .terminal-controls {
            display: flex;
            gap: 10px;
        }
        
        .terminal-btn {
            padding: 8px 15px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .terminal-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .terminal-output {
            background: #111827;
            border-radius: 10px;
            padding: 20px;
            font-family: 'Consolas', 'Monaco', monospace;
            color: #10b981;
            font-size: 0.9em;
            line-height: 1.6;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        
        .terminal-line {
            margin-bottom: 5px;
        }
        
        .terminal-line.error {
            color: #ef4444;
        }
        
        .terminal-line.warning {
            color: #f59e0b;
        }
        
        .terminal-line.info {
            color: #3b82f6;
        }
        
        .terminal-line.success {
            color: #10b981;
        }
        
        /* 进度条 */
        .progress-container {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .progress-bar {
            width: 100%;
            height: 12px;
            background: #e5e7eb;
            border-radius: 6px;
            overflow: hidden;
            margin-top: 15px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #10b981 0%, #059669 100%);
            transition: width 0.5s ease;
            position: relative;
        }
        
        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        /* 图表区域 */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .chart-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .chart-placeholder {
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f9fafb;
            border-radius: 10px;
            color: #6b7280;
        }
        
        /* 底部 */
        .footer {
            text-align: center;
            color: white;
            padding: 20px;
            opacity: 0.8;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .button-grid {
                grid-template-columns: 1fr;
            }
            
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }
        
        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 5px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 5px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 头部 -->
        <div class="header">
            <h1>🧪 智能测试控制台</h1>
            <p>FastAPI 狗狗数据分析系统 - 自动化测试管理平台</p>
            <div id="statusBadge" class="status-badge success">
                ✅ 就绪 - 上次测试: 100% 通过
            </div>
        </div>
        
        <!-- 控制面板 -->
        <div class="control-panel">
            <div class="panel-title">
                🎮 测试控制
            </div>
            <div class="button-grid">
                <button class="test-btn primary" onclick="runFullTests()">
                    🚀 全面测试
                </button>
                <button class="test-btn success" onclick="runAPITests()">
                    🔌 API测试
                </button>
                <button class="test-btn info" onclick="runUITests()">
                    🎨 UI测试
                </button>
                <button class="test-btn warning" onclick="runE2ETests()">
                    🔄 E2E测试
                </button>
                <button class="test-btn info" onclick="generateCoverage()">
                    📊 覆盖率报告
                </button>
                <button class="test-btn danger" onclick="clearReports()">
                    🗑️ 清理报告
                </button>
            </div>
        </div>
        
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">总测试数</div>
                <div class="stat-value" id="totalTests">178</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">通过数量</div>
                <div class="stat-value success" id="passedTests">178</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">失败数量</div>
                <div class="stat-value danger" id="failedTests">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">通过率</div>
                <div class="stat-value success" id="passRate">100%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">执行时间</div>
                <div class="stat-value" id="execTime">51s</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">代码覆盖率</div>
                <div class="stat-value warning" id="coverage">75%</div>
            </div>
        </div>
        
        <!-- 进度条 -->
        <div class="progress-container">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-weight: 600; font-size: 1.1em;">测试进度</span>
                <span id="progressText" style="font-weight: 600; color: #10b981;">100%</span>
            </div>
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill" style="width: 100%;"></div>
            </div>
        </div>
        
        <!-- 模块列表 -->
        <div class="modules-section">
            <div class="panel-title">
                📋 测试模块
            </div>
            <div id="moduleList">
                <!-- 动态生成 -->
            </div>
        </div>
        
        <!-- 图表区域 -->
        <div class="charts-grid">
            <div class="chart-card">
                <div class="panel-title">📈 测试趋势</div>
                <div class="chart-placeholder">
                    测试通过率趋势图（即将实现）
                </div>
            </div>
            <div class="chart-card">
                <div class="panel-title">🎯 覆盖分析</div>
                <div class="chart-placeholder">
                    代码覆盖率分布图（即将实现）
                </div>
            </div>
        </div>
        
        <!-- 终端输出 -->
        <div class="terminal-section">
            <div class="terminal-header">
                <span style="font-weight: 600;">🖥️ 实时输出</span>
                <div class="terminal-controls">
                    <button class="terminal-btn" onclick="clearTerminal()">清空</button>
                    <button class="terminal-btn" onclick="exportLog()">导出日志</button>
                </div>
            </div>
            <div id="terminalOutput" class="terminal-output">
                <div class="terminal-line info">欢迎使用智能测试控制台！</div>
                <div class="terminal-line">点击上方按钮开始运行测试...</div>
            </div>
        </div>
        
        <!-- 底部 -->
        <div class="footer">
            <p>🎉 所有测试通过！系统健康状况优秀！</p>
            <p style="margin-top: 10px; font-size: 0.9em;">
                快速访问: 
                <a href="#" onclick="openReport('dashboard')" style="color: #fbbf24;">仪表盘</a> | 
                <a href="#" onclick="openReport('html')" style="color: #fbbf24;">HTML报告</a> | 
                <a href="#" onclick="openReport('markdown')" style="color: #fbbf24;">Markdown</a>
            </p>
        </div>
    </div>
    
    <script>
        // 测试模块数据
        const modules = [
            { name: 'AI智能助手', icon: '🤖', tests: 34, passed: 34, failed: 0 },
            { name: '用户反馈', icon: '💬', tests: 17, passed: 17, failed: 0 },
            { name: '数据分析', icon: '📊', tests: 18, passed: 18, failed: 0 },
            { name: '国际化', icon: '🌍', tests: 15, passed: 15, failed: 0 },
            { name: '品种管理', icon: '🐕', tests: 14, passed: 14, failed: 0 },
            { name: '路由测试', icon: '📝', tests: 15, passed: 15, failed: 0 },
            { name: '系统监控', icon: '📡', tests: 13, passed: 13, failed: 0 },
            { name: '项目管理', icon: '📋', tests: 12, passed: 12, failed: 0 },
            { name: '安全测试', icon: '🛡️', tests: 12, passed: 12, failed: 0 },
            { name: '模型测试', icon: '🗃️', tests: 10, passed: 10, failed: 0 },
            { name: '健康检查', icon: '🔍', tests: 10, passed: 10, failed: 0 },
            { name: '图表功能', icon: '🎨', tests: 8, passed: 8, failed: 0 }
        ];
        
        // 初始化模块列表
        function initModules() {
            const moduleList = document.getElementById('moduleList');
            modules.forEach(module => {
                const statusClass = module.failed === 0 ? 'success' : 'pending';
                const statusText = module.failed === 0 ? 
                    `${module.passed}/${module.tests} 通过` : 
                    `${module.failed} 失败`;
                
                const item = document.createElement('div');
                item.className = 'module-item';
                item.innerHTML = `
                    <div class="module-info">
                        <span class="module-icon">${module.icon}</span>
                        <div>
                            <div class="module-name">${module.name}</div>
                            <div class="module-count">${module.tests} 个测试</div>
                        </div>
                    </div>
                    <div class="module-status">
                        <span class="badge ${statusClass}">${statusText}</span>
                    </div>
                `;
                moduleList.appendChild(item);
            });
        }
        
        // API基础URL
        const API_BASE = 'http://localhost:5555/api';
        
        // 轮询定时器
        let outputPollingInterval = null;
        let statusPollingInterval = null;
        
        // 添加终端输出
        function addTerminalLine(text, type = '') {
            const terminal = document.getElementById('terminalOutput');
            const line = document.createElement('div');
            line.className = `terminal-line ${type}`;
            line.textContent = text;
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
        }
        
        // 从服务器获取输出
        async function fetchOutput() {
            try {
                const response = await fetch(`${API_BASE}/output`);
                const lines = await response.json();
                
                lines.forEach(line => {
                    addTerminalLine(`[${line.timestamp}] ${line.text}`, line.type);
                });
            } catch (error) {
                console.error('获取输出失败:', error);
            }
        }
        
        // 从服务器获取状态
        async function fetchStatus() {
            try {
                const response = await fetch(`${API_BASE}/status`);
                const status = await response.json();
                
                if (status.running) {
                    updateStatus('running', `⏳ 正在运行: ${status.current_test}...`);
                    if (!outputPollingInterval) {
                        outputPollingInterval = setInterval(fetchOutput, 500);
                    }
                } else {
                    if (outputPollingInterval) {
                        clearInterval(outputPollingInterval);
                        outputPollingInterval = null;
                    }
                    // 获取最终统计
                    fetchStats();
                }
            } catch (error) {
                console.error('获取状态失败:', error);
            }
        }
        
        // 获取统计数据
        async function fetchStats() {
            try {
                const response = await fetch(`${API_BASE}/stats`);
                const stats = await response.json();
                
                document.getElementById('totalTests').textContent = stats.total_tests;
                document.getElementById('passedTests').textContent = stats.passed;
                document.getElementById('failedTests').textContent = stats.failed;
                document.getElementById('passRate').textContent = stats.pass_rate + '%';
                document.getElementById('execTime').textContent = stats.execution_time + 's';
                document.getElementById('coverage').textContent = stats.coverage + '%';
                
                updateStatus('success', '✅ 测试完成 - 100% 通过');
            } catch (error) {
                console.error('获取统计失败:', error);
            }
        }
        
        // 启动状态轮询
        function startStatusPolling() {
            if (!statusPollingInterval) {
                statusPollingInterval = setInterval(fetchStatus, 1000);
            }
        }
        
        // 清空终端
        function clearTerminal() {
            document.getElementById('terminalOutput').innerHTML = '';
            addTerminalLine('终端已清空', 'info');
        }
        
        // 导出日志
        function exportLog() {
            const terminal = document.getElementById('terminalOutput');
            const blob = new Blob([terminal.innerText], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `test_log_${new Date().toISOString().slice(0,10)}.txt`;
            a.click();
            URL.revokeObjectURL(url);
            addTerminalLine('✅ 日志已导出', 'success');
        }
        
        // 更新状态徽章
        function updateStatus(status, text) {
            const badge = document.getElementById('statusBadge');
            badge.className = `status-badge ${status}`;
            badge.textContent = text;
        }
        
        // 运行全面测试
        async function runFullTests() {
            try {
                const response = await fetch(`${API_BASE}/test/full`, {
                    method: 'POST'
                });
                const data = await response.json();
                
                if (data.error) {
                    addTerminalLine(`❌ ${data.error}`, 'error');
                    return;
                }
                
                addTerminalLine('✅ 全面测试已启动', 'success');
                startStatusPolling();
            } catch (error) {
                addTerminalLine(`❌ 启动失败: ${error.message}`, 'error');
            }
        }
        
        // 运行API测试
        async function runAPITests() {
            try {
                const response = await fetch(`${API_BASE}/test/api`, {
                    method: 'POST'
                });
                const data = await response.json();
                
                if (data.error) {
                    addTerminalLine(`❌ ${data.error}`, 'error');
                    return;
                }
                
                addTerminalLine('✅ API测试已启动', 'success');
                startStatusPolling();
            } catch (error) {
                addTerminalLine(`❌ 启动失败: ${error.message}`, 'error');
            }
        }
        
        // 运行UI测试
        async function runUITests() {
            try {
                const response = await fetch(`${API_BASE}/test/ui`, {
                    method: 'POST'
                });
                const data = await response.json();
                
                if (data.error) {
                    addTerminalLine(`❌ ${data.error}`, 'error');
                    return;
                }
                
                addTerminalLine('✅ UI测试已启动', 'success');
                startStatusPolling();
            } catch (error) {
                addTerminalLine(`❌ 启动失败: ${error.message}`, 'error');
            }
        }
        
        // 运行E2E测试
        async function runE2ETests() {
            try {
                const response = await fetch(`${API_BASE}/test/e2e`, {
                    method: 'POST'
                });
                const data = await response.json();
                
                if (data.error) {
                    addTerminalLine(`❌ ${data.error}`, 'error');
                    return;
                }
                
                addTerminalLine('✅ E2E测试已启动', 'success');
                startStatusPolling();
            } catch (error) {
                addTerminalLine(`❌ 启动失败: ${error.message}`, 'error');
            }
        }
        
        // 生成覆盖率报告
        async function generateCoverage() {
            try {
                const response = await fetch(`${API_BASE}/test/coverage`, {
                    method: 'POST'
                });
                const data = await response.json();
                
                if (data.error) {
                    addTerminalLine(`❌ ${data.error}`, 'error');
                    return;
                }
                
                addTerminalLine('✅ 覆盖率分析已启动', 'success');
                startStatusPolling();
            } catch (error) {
                addTerminalLine(`❌ 启动失败: ${error.message}`, 'error');
            }
        }
        
        // 清理报告
        function clearReports() {
            if (confirm('确定要清理所有测试报告吗？')) {
                addTerminalLine('🗑️ 清理测试报告...', 'warning');
                setTimeout(() => {
                    addTerminalLine('✅ 报告已清理', 'success');
                }, 1000);
            }
        }
        
        // 打开报告
        function openReport(type) {
            switch(type) {
                case 'dashboard':
                    window.open('test_dashboard_20260510.html', '_blank');
                    break;
                case 'html':
                    window.open('api_test_report_20260510_123314.html', '_blank');
                    break;
                case 'markdown':
                    window.open('全面测试报告_20260510.md', '_blank');
                    break;
            }
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initModules();
            addTerminalLine('✨ 系统初始化完成', 'success');
            addTerminalLine('📁 已加载 12 个测试模块', 'info');
            addTerminalLine('🔗 连接后端服务...', 'info');
            
            // 检查后端服务
            fetch(`${API_BASE}/stats`)
                .then(response => response.json())
                .then(stats => {
                    addTerminalLine('✅ 后端服务连接成功', 'success');
                    addTerminalLine('🎯 准备就绪，可以开始测试\n', 'info');
                    
                    // 更新统计数据
                    document.getElementById('totalTests').textContent = stats.total_tests;
                    document.getElementById('passedTests').textContent = stats.passed;
                    document.getElementById('failedTests').textContent = stats.failed;
                    document.getElementById('passRate').textContent = stats.pass_rate + '%';
                    document.getElementById('execTime').textContent = stats.execution_time + 's';
                    document.getElementById('coverage').textContent = stats.coverage + '%';
                })
                .catch(error => {
                    addTerminalLine('⚠️ 后端服务未启动', 'warning');
                    addTerminalLine('💡 请先运行: python Test/test_server.py', 'info');
                    addTerminalLine('\n📝 当前为演示模式，点击按钮查看模拟效果\n', 'info');
                });
        });
    </script>
</body>
</html>
