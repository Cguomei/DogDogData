<h2>选择页面布局</h2>
<p class="subtitle">12款狗粮商品的展示方式</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>商品网格 + 悬浮购物车</h3>
      <p>卡片网格展示全部12款，每张卡片: 图片 + 名称 + 价格 + "加入购物车"按钮。<br>
      购物车在右侧悬浮面板或底部弹出，不跳转页面。</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>分类列表页 → 商品详情页</h3>
      <p>先展示分类/列表页，点击商品进入详情页（大图+描述+规格），<br>
      在详情页加入购物车，购物车在独立页面。</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>单页商店（全部在一页）</h3>
      <p>顶部导航/banner，中间全部12款商品网格，底部购物车区域。<br>
      所有操作在同一页面完成，简洁明了。</p>
    </div>
  </div>
</div>
