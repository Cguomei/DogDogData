# Prometheus 配置文件
# 用于监控狗狗数据分析系统

global:
  scrape_interval: 15s  # 每15秒采集一次数据
  evaluation_interval: 15s  # 每15秒评估一次规则
  scrape_timeout: 10s

# 告警规则文件
rule_files:
  - "alerts.yml"

# 数据采集目标
scrape_configs:
  # Flask 应用指标
  - job_name: 'flask_app'
    static_configs:
      - targets: ['host.docker.internal:5000']  # Docker 中使用 host.docker.internal
        labels:
          instance: 'dog_data_app'
          environment: 'development'
    
    metrics_path: '/metrics'
    scrape_interval: 10s  # 更频繁的采集
    
  # Node Exporter（系统指标）
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['host.docker.internal:9100']
        labels:
          instance: 'server'
  
  # Prometheus 自身指标
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
